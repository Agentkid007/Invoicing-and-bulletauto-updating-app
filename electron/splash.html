<!DOCTYPE html>
<!--
  electron/splash.html
  Standalone splash screen for the BulletAuto Electron app.
  Shown in a frameless BrowserWindow while the main window loads.
  Uses pure HTML/CSS/JS — no bundler required.

  Animation sequence (≈ 3.5 s):
    0.00 – 0.72 s  Phase intro  : emblem rotates in with blue glow
    0.72 – 1.28 s  Phase reveal : smile fades in, monitor slides up
    1.28 – 2.20 s  Phase text   : KIDDY wipes in, PRODUCTIONS fades in
    2.20 – 3.10 s  Phase outro  : blue pulse ring radiates outward
    3.10 – 3.55 s  Exit fade    : overlay fades to transparent
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BulletAuto</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Roboto:wght@400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      -webkit-app-region: drag;   /* allow drag-to-move */
    }

    /* ── Overlay ──────────────────────────────────────────────── */
    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      transition: opacity 0.45s ease;
    }
    #splash.exiting { opacity: 0; }

    /* ── SVG emblem ───────────────────────────────────────────── */
    #emblem {
      width: 200px; height: 200px;
      position: relative;
    }
    #emblem svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 20px rgba(33,150,243,0.85));
    }

    /* ── Pulse ring ───────────────────────────────────────────── */
    #pulseRing {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Text ─────────────────────────────────────────────────── */
    #textBlock {
      margin-top: 20px;
      text-align: center;
      height: 72px;
      overflow: hidden;
    }
    #brandName {
      font-family: 'Orbitron', sans-serif;
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(90deg, #1565c0 0%, #42a5f5 50%, #1565c0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      clip-path: inset(0 100% 0 0);
      opacity: 0;
    }
    #brandSub {
      font-family: 'Roboto', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 5px;
      color: rgba(180,195,220,0.85);
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.45s ease 0.35s, transform 0.45s ease 0.35s;
    }

    /* ── Monitor frame initial state (hidden) ─────────────────── */
    #monitorGroup {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.45s cubic-bezier(0.34,1.56,0.64,1) 0.05s,
                  transform 0.45s cubic-bezier(0.34,1.56,0.64,1) 0.05s;
    }
    #monitorGroup.visible { opacity: 1; transform: translateY(0); }

    /* ── Smile initial state (hidden) ─────────────────────────── */
    #smile {
      opacity: 0;
      transition: opacity 0.4s ease 0.1s;
    }
    #smile.visible { opacity: 1; }

    /* ── Phase: intro ─────────────────────────────────────────── */
    #emblem.intro {
      animation: emblemRotateIn 0.72s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes emblemRotateIn {
      0%   { opacity:0; transform: scale(0.4) rotate(-270deg);
             filter: drop-shadow(0 0 0px rgba(33,150,243,0)); }
      55%  { opacity:1; transform: scale(1.08) rotate(15deg);
             filter: drop-shadow(0 0 32px rgba(33,150,243,1)); }
      100% { opacity:1; transform: scale(1) rotate(0deg);
             filter: drop-shadow(0 0 20px rgba(33,150,243,0.85)); }
    }

    /* ── Phase: reveal ────────────────────────────────────────── */
    #emblem.reveal {
      animation: emblemPulse 0.55s ease forwards;
    }
    @keyframes emblemPulse {
      0%   { filter: drop-shadow(0 0 20px rgba(33,150,243,0.85)); }
      50%  { filter: drop-shadow(0 0 38px rgba(33,150,243,1)); transform: scale(1.04); }
      100% { filter: drop-shadow(0 0 22px rgba(33,150,243,0.9)); transform: scale(1); }
    }

    /* ── Phase: text ──────────────────────────────────────────── */
    #brandName.wipe {
      animation: kiddyWipe 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes kiddyWipe {
      0%   { clip-path: inset(0 100% 0 0); opacity:1; }
      100% { clip-path: inset(0 0%   0 0); opacity:1; }
    }
    #brandSub.fadein { opacity:1; transform: translateY(0); }

    /* ── Phase: outro ─────────────────────────────────────────── */
    #emblem.outro {
      animation: emblemSettle 0.7s ease forwards;
    }
    @keyframes emblemSettle {
      0%   { filter: drop-shadow(0 0 22px rgba(33,150,243,0.9)); }
      50%  { filter: drop-shadow(0 0 40px rgba(33,150,243,1)); transform: scale(1.03); }
      100% { filter: drop-shadow(0 0 12px rgba(33,150,243,0.6)); transform: scale(1); }
    }
    #pulseRing.pulse {
      animation: pulsateRing 0.85s ease-out forwards;
    }
    @keyframes pulsateRing {
      0%   { width:180px; height:180px; opacity:0.85; border:2px solid #2196f3; top:10px; left:10px; }
      100% { width:340px; height:340px; opacity:0;    border:1px solid #2196f3; top:-70px; left:-70px; }
    }
  </style>
</head>
<body>
  <div id="splash">
    <!-- Pulse ring sits behind text but in front of emblem during outro -->
    <div id="pulseRing"></div>

    <!-- Animated SVG emblem -->
    <div id="emblem">
      <svg viewBox="0 0 220 230" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="3.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <linearGradient id="monGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#1a2a5e"/>
            <stop offset="100%" stop-color="#0d1520"/>
          </linearGradient>
          <linearGradient id="circGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#0d1a3a"/>
            <stop offset="100%" stop-color="#101c38"/>
          </linearGradient>
        </defs>

        <!-- Monitor body (slides up) -->
        <g id="monitorGroup">
          <rect x="22" y="18" width="162" height="150" rx="22" ry="22"
                fill="url(#monGrad)" stroke="#1e5fc7" stroke-width="2.8" filter="url(#glow)"/>
          <rect x="174" y="10" width="20" height="20" rx="5" ry="5"
                fill="#0d1520" stroke="#4a7fd4" stroke-width="1.8"/>
          <rect x="88" y="168" width="44" height="14" rx="4" fill="#1a2550"/>
          <rect x="68" y="180" width="84" height="9"  rx="5" fill="#1a2550"/>
        </g>

        <!-- Circle emblem (always visible — the rotating core) -->
        <circle cx="103" cy="90" r="57" fill="url(#circGrad)" filter="url(#glow)"/>
        <circle cx="103" cy="90" r="57" fill="none" stroke="#2677e8" stroke-width="3.2"/>
        <line x1="103" y1="33" x2="103" y2="147" stroke="#2677e8" stroke-width="1.6" opacity="0.65"/>
        <line x1="46"  y1="90" x2="160" y2="90"  stroke="#2677e8" stroke-width="1.6" opacity="0.65"/>

        <!-- Eyes -->
        <circle cx="83"  cy="75" r="8.5" fill="#c5dcff"/>
        <circle cx="123" cy="75" r="8.5" fill="#c5dcff"/>

        <!-- Smile (fades in during reveal) -->
        <g id="smile">
          <path d="M 73 104 Q 103 132 133 104"
                stroke="#c5dcff" stroke-width="4.5" fill="none" stroke-linecap="round"/>
        </g>
      </svg>
    </div>

    <!-- Brand text -->
    <div id="textBlock">
      <div id="brandName">KIDDY</div>
      <div id="brandSub">PRODUCTIONS</div>
    </div>
  </div>

  <script>
    const emblem      = document.getElementById('emblem');
    const monitorGrp  = document.getElementById('monitorGroup');
    const smile       = document.getElementById('smile');
    const brandName   = document.getElementById('brandName');
    const brandSub    = document.getElementById('brandSub');
    const pulseRing   = document.getElementById('pulseRing');
    const splash      = document.getElementById('splash');

    function applyClass(el, cls) {
      // remove any existing phase classes then add new one
      el.classList.remove('intro','reveal','text','outro','wipe','fadein','pulse');
      if (cls) el.classList.add(cls);
    }

    // Phase 0 — INTRO (0 ms)
    applyClass(emblem, 'intro');

    // Phase 1 — REVEAL (720 ms)
    setTimeout(() => {
      applyClass(emblem, 'reveal');
      monitorGrp.classList.add('visible');
      smile.classList.add('visible');
    }, 720);

    // Phase 2 — TEXT (1 280 ms)
    setTimeout(() => {
      applyClass(emblem, null);  // keep settled state
      brandName.classList.add('wipe');
      brandSub.classList.add('fadein');
    }, 1280);

    // Phase 3 — OUTRO (2 200 ms)
    setTimeout(() => {
      applyClass(emblem, 'outro');
      pulseRing.classList.add('pulse');
    }, 2200);

    // Exit fade (3 100 ms)
    setTimeout(() => {
      splash.classList.add('exiting');
    }, 3100);

    // Signal Electron main process that animation finished (3 550 ms)
    setTimeout(() => {
      if (window.electronSplash && window.electronSplash.done) {
        window.electronSplash.done();
      }
    }, 3550);
  </script>
</body>
</html>
